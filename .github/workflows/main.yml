name: IPTV Auto Update

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  update-iptv:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        # 使用 PAT 代替 GITHUB_TOKEN
        token: ${{ secrets.PAT_TOKEN }}

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: curl

    - name: Prepare directories
      run: |
        mkdir -p ip template txt speedlog

    - name: Run IPTV Scanner
      timeout-minutes: 120
      run: |
        php zubo.php all 联通 --auto
      env:
        TZ: Asia/Shanghai

    - name: Check output files
      run: |
        echo "=== Generated files ==="
        ls -lh zubo_all.* txt/ 2>/dev/null || true
        echo ""
        head -20 zubo_all.txt 2>/dev/null || echo "File not found"

    - name: Commit and push results
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add zubo_all.txt zubo_all.m3u
        git add txt/*.txt 2>/dev/null || true
        git add ip/*_ip.txt 2>/dev/null || true
        
        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        
        git commit -m "Update IPTV lists - $(date +'%Y-%m-%d %H:%M:%S') CST"
        # 使用 PAT 推送
        git push https://${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git main
