name: IPTV IP 自动提取
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 安装 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 运行提取脚本
        run: |
          cd zubo
          node extract.js

      - name: 提交更新
        run: |
          git config --global user.name "Actions"
          git config --global user.email "actions@github.com"
          git add zubo/ip_all.json
          git commit -m "自动更新 IP列表 $(date +'%Y-%m-%d %H:%M')" || echo "无更新"
          git push
