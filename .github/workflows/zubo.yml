name: 自动更新IPTV组播源

on:
  schedule:
    - cron: '30 8 * * *'  # 每日8:30 UTC（北京时间16:30）自动运行
  workflow_dispatch:      # 支持手动触发

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # 超时保护，避免无限运行
    if: github.ref == 'refs/heads/main' # 仅主分支运行，master分支请替换为master

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false # 关闭默认凭证，避免干扰自定义令牌

      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends yt-dlp sed nmap netcat-traditional curl
          # 验证核心命令，缺失则终止
          command -v yt-dlp || { echo "yt-dlp安装失败"; exit 1; }
          command -v nc || { echo "netcat安装失败"; exit 1; }

      - name: 测试组播源
        id: test_zubo
        run: |
          cd $GITHUB_WORKSPACE
          mkdir -p txt # 强制确保txt目录存在，避免文件生成失败
          bash ./zubo.sh
          time=$(date +%Y/%m/%d)
          echo "浙江频道 $time 更新,#genre#" > zubo.txt
          # 省份文件数组，容错合并（不存在则跳过）
          PROVINCE_FILES=(
            "txt/浙江电信.txt"
            "txt/湖南电信.txt" "txt/湖北电信.txt" "txt/广东电信.txt"
            "txt/北京联通.txt" "txt/四川电信.txt" "txt/江苏电信.txt"
            "txt/上海电信.txt" "txt/福建电信.txt" "txt/安徽电信.txt"
            "txt/江西电信.txt" "txt/天津联通.txt" "txt/河南联通.txt"
            "txt/河南电信.txt" "txt/河北电信.txt" "txt/河北联通.txt"
            "txt/山东电信.txt" "txt/北京电信.txt" "txt/陕西电信.txt"
            "txt/广西电信.txt" "txt/贵州电信.txt" "txt/山西联通.txt"
            "txt/重庆电信.txt" "txt/海南电信.txt" "txt/吉林电信.txt"
            "txt/云南电信.txt" "txt/湖北联通.txt" "txt/山东联通.txt"
            "txt/重庆联通.txt" "txt/黑龙江联通.txt" "txt/辽宁联通.txt"
            "txt/甘肃电信.txt" "txt/新疆电信.txt" "txt/宁夏电信.txt"
          )
          for file in "${PROVINCE_FILES[@]}"; do
            if [ -f "$file" ]; then
              cat "$file" >> zubo.txt
              echo "✅ 合并成功：$file"
            else
              echo "⚠️ 文件不存在，跳过：$file"
            fi
          done
          ls -lh zubo.txt && echo "📄 组播源文件生成完成"

      - name: 配置Git并处理代码变更
        id: git_config
        run: |
          cd $GITHUB_WORKSPACE
          # 配置Git官方bot身份
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # 强制拉取最新代码，解决分支冲突（自动化场景无需保留本地冲突）
          git pull origin main --force 2>/dev/null || echo "📌 首次运行/无远程代码，跳过拉取"
          # 仅添加组播源相关文件，避免误提交无关内容
          git add zubo.txt txt/*.txt
          # 检查是否有代码变更，避免空提交
          if git status --porcelain | grep -q .; then
            git commit -m "📌 更新IPTV组播源 - $(date +%Y/%m/%d %H:%M:%S)"
            echo "✅ 代码提交成功"
            echo "has_change=true" >> $GITHUB_OUTPUT
          else
            echo "📌 无代码变更，跳过推送"
            echo "has_change=false" >> $GITHUB_OUTPUT
          fi

      - name: 原生Git推送代码到仓库
        if: steps.git_config.outputs.has_change == 'true' # 仅有变更时推送
        run: |
          cd $GITHUB_WORKSPACE
          # 核心：原生git push，用令牌拼接仓库地址，强制推送
          git push https://${{ secrets.GH_TOKEN }}@github.com/${{ secrets.GH_PATH }}.git main --force
