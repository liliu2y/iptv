name: 自动更新IPTV组播源

on:
  schedule:
    - cron: '30 8 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main' # 仓库分支是master则改为master

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends yt-dlp sed nmap netcat-traditional curl
          command -v yt-dlp || { echo "yt-dlp安装失败"; exit 1; }
          command -v nc || { echo "netcat安装失败"; exit 1; }

      - name: 测试组播源
        id: test_zubo
        run: |
          cd $GITHUB_WORKSPACE
          # 确保txt目录存在，避免文件生成失败
          mkdir -p txt
          bash ./zubo.sh
          time=$(date +%Y/%m/%d)
          echo "浙江频道 $time 更新,#genre#" > zubo.txt
          # 省份文件数组，替换无效的浙江.txt为浙江电信.txt
          PROVINCE_FILES=(
            "txt/浙江电信.txt"
            "txt/湖南电信.txt" "txt/湖北电信.txt" "txt/广东电信.txt"
            "txt/北京联通.txt" "txt/四川电信.txt" "txt/江苏电信.txt"
            "txt/上海电信.txt" "txt/福建电信.txt" "txt/安徽电信.txt"
            "txt/江西电信.txt" "txt/天津联通.txt" "txt/河南联通.txt"
            "txt/河南电信.txt" "txt/河北电信.txt" "txt/河北联通.txt"
            "txt/山东电信.txt" "txt/北京电信.txt" "txt/陕西电信.txt"
            "txt/广西电信.txt" "txt/贵州电信.txt" "txt/山西联通.txt"
            "txt/重庆电信.txt" "txt/海南电信.txt" "txt/吉林电信.txt"
            "txt/云南电信.txt" "txt/湖北联通.txt" "txt/山东联通.txt"
            "txt/重庆联通.txt" "txt/黑龙江联通.txt" "txt/辽宁联通.txt"
            "txt/甘肃电信.txt" "txt/新疆电信.txt" "txt/宁夏电信.txt"
          )
          # 容错合并文件
          for file in "${PROVINCE_FILES[@]}"; do
            if [ -f "$file" ]; then
              cat "$file" >> zubo.txt
              echo "✅ 合并成功：$file"
            else
              echo "⚠️ 文件不存在，跳过：$file"
            fi
          done
          ls -lh zubo.txt && echo "📄 组播源文件生成完成"

      - name: 配置Git并处理代码变更
        id: git_config
        run: |
          cd $GITHUB_WORKSPACE
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # 强制拉取最新代码，解决分支冲突
          git pull origin main --force 2>/dev/null || echo "📌 无远程代码，跳过拉取"
          # 仅添加相关文件，避免误提交
          git add zubo.txt txt/*.txt
          # 检查变更，避免空提交
          if git status --porcelain | grep -q .; then
            git commit -m "📌 更新IPTV组播源 - $(date +%Y/%m/%d %H:%M:%S)"
            echo "✅ 代码提交成功"
            echo "has_change=true" >> $GITHUB_OUTPUT
          else
            echo "📌 无代码变更，跳过推送"
            echo "has_change=false" >> $GITHUB_OUTPUT
          fi

      - name: 推送代码到仓库
        if: steps.git_config.outputs.has_change == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GH_TOKEN }} # 核心：用你的仓库Secrets令牌
          repository: ${{ secrets.GH_PATH }}    # 格式：用户名/仓库名（如xxx/iptv）
          branch: main                          # 仓库是master则改为master
          force: true                           # 强制推送，解决分支不一致
          directory: .                          # 推送当前工作目录
